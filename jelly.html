<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Toon Jelly — Тропа</title>
  <script type="module" crossorigin src="./assets/jelly-B_Wwspne.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/space-792A7NK1.js">
  <link rel="modulepreload" crossorigin href="./assets/audio-BbpvzKEm.js">
  <link rel="stylesheet" crossorigin href="./assets/space-DsJQTpQO.css">
  <link rel="stylesheet" crossorigin href="./assets/jelly-ZrCDKTI4.css">
</head>
<body>
  <div id="app"></div>

  <a id="sandbox-link" href="./index.html">← Меню</a>
  <button id="btn-mute" title="Звук">🔊</button>

  <!-- Карточка статуса -->
  <div id="flower-card">
    <span class="fc-row"><span class="fc-icon">🫧</span><span class="fc-label">Объём</span><span id="stat-vol" class="fc-count">2</span></span>
    <span class="fc-row"><span class="fc-icon">🔵</span><span class="fc-label">Блобов</span><span id="stat-blobs" class="fc-count">до 1</span></span>
    <span class="fc-row"><span class="fc-icon">🌸</span><span class="fc-label">Цветы</span><span id="flower-count" class="fc-count">0/2</span></span>
  </div>

  <div id="page-title">🛝 Желе-тропа</div>

  <div id="hint">WASD — катиться · мышь — взять желе · Пробел / 🫧 — делиться / собраться</div>

  <!-- Стартовый облёт: пропустить -->
  <button id="btn-skip">Пропустить облёт ▸</button>

  <!-- Подсказка про недоступное деление -->
  <div id="split-hint">Нужен объём 4, чтобы делиться</div>

  <!-- Виртуальный джойстик (тач) -->
  <div id="joy-base"><div id="joy-stick"></div></div>

  <!-- Кнопка деления/слияния -->
  <button id="btn-split" title="Разделиться / собраться">🫧</button>

  <!-- Экран победы -->
  <div id="win-screen" class="hidden">
    <div class="win-card">
      <div class="win-title">✨ Пройдено!</div>
      <div class="win-buttons">
        <button class="pill pill-accent" id="btn-again">↺ Ещё раз</button>
      </div>
    </div>
  </div>

</body>
</html>
